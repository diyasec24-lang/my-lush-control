<!DOCTYPE html>
<html>
<head>
  <title>Receiver Page</title>
  <style>
    #box { width: 100px; height: 100px; background: cyan; margin: 100px auto; border-radius: 20px; transition: 0.1s; }
    .vibrate { animation: shake 0.2s infinite; }
    @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -2px); } 100% { transform: translate(1px, 1px); } }
  </style>
</head>
<body>
  <h2 style="text-align: center;">صفحة الاستقبال (تنتظر الإشارة...)</h2>
  <div id="box"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const box = document.getElementById('box');
    
    socket.on('perform-vibration', (data) => {
      box.classList.add('vibrate');
      setTimeout(() => box.classList.remove('vibrate'), 500); // يتوقف بعد نصف ثانية
    });
  </script>
</body>
</html>
